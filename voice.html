<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Echolocation — voice scene discussion</title>
<style>
  html,body{margin:0;height:100%;background:#000;font-family:-apple-system,system-ui,sans-serif;color:#fff}
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
  #panel{position:fixed;top:0;left:0;right:0;z-index:100000;padding:10px;display:flex;gap:8px;background:#000c}
  input,button{font-size:15px;padding:11px;border-radius:9px;border:1px solid #444;background:#15171c;color:#fff}
  input{flex:1}
  button{font-weight:600;background:linear-gradient(135deg,#cc1557,#7b1d9b);border:none}
  small{position:fixed;top:58px;left:12px;right:12px;z-index:100000;color:#aaa;font-size:12px;line-height:1.4}
</style>
</head>
<body>
<video id="cam" playsinline muted></video>
<div id="panel">
  <input id="key" type="password" placeholder="sk-ant-… (kept in memory only, never saved)" autocomplete="off" />
  <button id="start">Start</button>
</div>
<small id="hint">Paste your Anthropic key, tap Start, allow camera + mic. Then <b>double-tap</b> anywhere to describe the scene and talk about it.</small>

<script type="module">
import { createDiscussion } from './claude-discuss.js';
const video = document.getElementById('cam'), key = document.getElementById('key');
document.getElementById('start').addEventListener('click', async () => {
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }, audio: false,
    });
    video.srcObject = s; await video.play();
    document.getElementById('panel').style.display = 'none';
    document.getElementById('hint').style.display = 'none';
    createDiscussion({
      video,
      getApiKey: () => key.value.trim(),       // dev: pasted key, in memory only
      // endpoint: 'https://YOUR-WORKER.workers.dev',  getApiKey: () => null,  // <- switch to this for the proxy
      model: 'claude-sonnet-4-6',
    });
  } catch (e) { alert('Could not start camera: ' + e.message); }
});
</script>
</body>
</html>
